services:
  huobao-drama:
    # image: huobao-drama:latest
    container_name: huobao-drama
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Docker Hub mirror (keep trailing slash)
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        # npm mirror
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        # Go proxy
        GO_PROXY: ${GO_PROXY:-}
        # Alpine apk mirror
        ALPINE_MIRROR: ${ALPINE_MIRROR:-}
    ports:
      - "5678:5678"
    volumes:
      # Persistent data directory (named volume, container runs as root)
      - huobao-data:/app/data
      # Mount config file (optional, uncomment to customize)
      # - ./configs/config.yaml:/app/configs/config.yaml:ro
      # If using local directory mounts, ensure permissions are correct
      # Example: - ./data:/app/data (requires chmod 777 ./data)
    environment:
      - TZ=Asia/Shanghai
      # Access host services from container:
      # Use host.docker.internal instead of 127.0.0.1
      # Example: http://host.docker.internal:11434 (Ollama)
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Cross-platform host gateway
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - huobao-network

volumes:
  huobao-data:
    driver: local

networks:
  huobao-network:
    driver: bridge
